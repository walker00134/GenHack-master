name: Build GenyV2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Build GenyV2
      run: msbuild "GenyV2.slnx" /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143
      
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: GenyV2-Release
        path: x64/Release/GenyV2.exe
