name: Build GenyV2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Build Project
      run: msbuild "GenyV2.vcxproj" /p:Configuration=Release /p:Platform=x64

    - name: Upload EXE
      uses: actions/upload-artifact@v3
      with:
        name: GenyV2-Release
        path: GenyV2\x64\Release\GenyV2.exe
